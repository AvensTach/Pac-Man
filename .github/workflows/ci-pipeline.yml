name: Python CI Pipeline

# 1. WHEN to run this pipeline?
on:
  push:
    branches: [ "main", "master" , "dev", "Artur", "Ivan", "Olha" ]
  pull_request:
    branches: [ "main", "master" , "dev", "Artur", "Ivan", "Olha" ]

jobs:
  build-and-test:
    # 2. WHERE to run? (Virtual machine on GitHub servers)
    runs-on: ubuntu-latest

    # 3. Matrix setup (allows testing on multiple Python versions)
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    # Step 1: Download your code to the virtual machine
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up the required Python version
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Cache packages to speed up future runs

    # Step 3: Install project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # If you have a requirements.txt file, GitHub will install libraries from it (e.g., pygame)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install tools for checking the code
        pip install pylint pytest

    # Step 4: Run the linter (Pylint)
    - name: Lint code (Pylint)
      run: |
        # Runs pylint for all .py files. 
        # It will automatically use your local .pylintrc file
        pylint $(git ls-files '*.py')

    # Step 5: Run automated tests (Pytest)
    - name: Run tests (Pytest)
      run: |
        pytest