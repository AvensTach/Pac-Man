name: Python CI Pipeline

on:
  push:
    branches: [ "main", "master", "dev", "Artur", "Ivan", "Olha" ]
  pull_request:
    branches: [ "main", "master", "dev", "Artur", "Ivan", "Olha" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      SDL_AUDIODRIVER: dummy
      SDL_VIDEODRIVER: dummy

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # If you have a requirements.txt file, GitHub will install libraries from it
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install tools for checking the code
        pip install pylint pytest

    - name: Lint code (Pylint)
      run: |
        # Runs pylint for all .py files and passes if score is >= 8.5
        pylint --fail-under=8.5 $(git ls-files '*.py')

    - name: Run tests (Pytest)
      run: |
        pytest