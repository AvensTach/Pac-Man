name: Python CI Pipeline

on:
  push:
    branches: [ "main", "master", "dev", "Artur", "Ivan", "Olha" ]
  pull_request:
    branches: [ "main", "master", "dev", "Artur", "Ivan", "Olha" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      SDL_AUDIODRIVER: dummy
      SDL_VIDEODRIVER: dummy

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-html pylint

    - name: Lint code (Pylint)
      run: |
        # Runs pylint for all .py files and passes if score is >= 8.5
        pylint --fail-under=8.5 $(git ls-files '*.py') > pylint_report.txt || true

    - name: Run tests (Pytest)
      run: |
        pytest --html=pytest_report.html --self-contained-html || true

    - name: Upload Test and Linting Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-quality-reports
        path: |
          pytest_report.html
          pylint_report.txt
        retention-days: 14 # Reports will be available for 14 days